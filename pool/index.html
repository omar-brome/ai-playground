<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>8-Ball Pool</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-xxl-10">
        <div class="card glass-card shadow-lg">
          <div class="card-body p-3 p-md-4">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
              <h1 class="h3 mb-0">8-Ball Pool</h1>
              <button id="restartBtn" class="btn btn-warning fw-semibold">Restart Game</button>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <div id="player1Card" class="player-card active-player">
                  <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-semibold">Player 1</span>
                    <span id="p1Group" class="badge group-badge">Unassigned</span>
                  </div>
                  <div class="small mt-1">Pocketed: <span id="p1Pocketed">0</span></div>
                </div>
              </div>
              <div class="col-md-6">
                <div id="player2Card" class="player-card">
                  <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-semibold">Player 2</span>
                    <span id="p2Group" class="badge group-badge">Unassigned</span>
                  </div>
                  <div class="small mt-1">Pocketed: <span id="p2Pocketed">0</span></div>
                </div>
              </div>
            </div>

            <div class="status-wrap mb-3">
              <div id="turnIndicator" class="status-line">Player 1's turn</div>
              <div id="statusMessage" class="status-subline">Drag from cue ball to aim and set power.</div>
            </div>

            <div class="table-container">
              <canvas id="poolCanvas" width="1000" height="560"></canvas>
            </div>

            <div class="mt-3">
              <label for="powerBar" class="form-label mb-1">Shot Power</label>
              <div class="progress power-progress">
                <div id="powerBar" class="progress-bar bg-danger" role="progressbar" style="width: 0%"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
