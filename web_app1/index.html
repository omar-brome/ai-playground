<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Management Dashboard</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="dashboard-header shadow-sm">
    <div class="container-fluid">
      <div class="d-flex flex-wrap align-items-center justify-content-between py-3">
        <h1 class="logo m-0">PeoplePulse</h1>
        <nav class="main-nav" aria-label="Primary">
          <ul class="nav gap-2 flex-wrap">
            <li class="nav-item">
              <button type="button" class="nav-link menu-btn active" data-nav="home" aria-current="page">Home</button>
            </li>
            <li class="nav-item">
              <button type="button" class="nav-link menu-btn" data-nav="settings" aria-current="false">Settings</button>
            </li>
            <li class="nav-item">
              <button type="button" class="nav-link menu-btn" data-nav="help" aria-current="false">Help</button>
            </li>
            <li class="nav-item">
              <button type="button" class="nav-link menu-btn" data-nav="companies" aria-current="false">Companies</button>
            </li>
            <li class="nav-item">
              <button type="button" class="nav-link menu-btn" data-nav="management" aria-current="false">Management</button>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <main id="main-content" class="container-fluid mt-4 mb-4" tabindex="-1">
    <div id="panel-home" class="nav-panel">
      <div class="row g-4">
        <aside class="col-lg-3 col-xl-2" aria-label="Filters">
          <section class="filter-panel p-3 rounded-4 shadow-sm">
            <h5 class="mb-3" id="filter-heading">Filter by Company</h5>
            <div id="companyFilters" class="company-filters" role="group" aria-labelledby="filter-heading"></div>
            <button type="button" id="clearFilters" class="btn btn-sm btn-outline-light mt-3 w-100">Clear Filters</button>
          </section>
        </aside>

        <section class="col-lg-9 col-xl-10" aria-labelledby="employees-heading">
          <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <h4 id="employees-heading" class="m-0 text-light">Employees</h4>
            <span id="resultsCount" class="badge rounded-pill count-pill" aria-live="polite"></span>
          </div>
          <div class="row g-2 mb-3 align-items-end">
            <div class="col-md-6 col-lg-5">
              <label for="employeeSearch" class="form-label text-secondary small mb-1">Search</label>
              <input type="search" id="employeeSearch" class="form-control form-control-sm" placeholder="Name, phone, company…" autocomplete="off">
            </div>
            <div class="col-md-4 col-lg-3">
              <label for="employeeSort" class="form-label text-secondary small mb-1">Sort by</label>
              <select id="employeeSort" class="form-select form-select-sm">
                <option value="name-asc">Name (A–Z)</option>
                <option value="name-desc">Name (Z–A)</option>
                <option value="company-asc">Company (A–Z)</option>
                <option value="company-desc">Company (Z–A)</option>
              </select>
            </div>
          </div>
          <div id="employeeGrid" class="row g-4" role="list"></div>
        </section>
      </div>
    </div>

    <div id="panel-settings" class="nav-panel nav-panel-placeholder" hidden>
      <p class="lead text-light mb-0">Settings — coming soon.</p>
    </div>
    <div id="panel-help" class="nav-panel nav-panel-placeholder" hidden>
      <p class="lead text-light mb-0">Help — coming soon.</p>
    </div>
    <div id="panel-companies" class="nav-panel nav-panel-placeholder" hidden>
      <p class="lead text-light mb-0">Companies — coming soon.</p>
    </div>
    <div id="panel-management" class="nav-panel nav-panel-placeholder" hidden>
      <p class="lead text-light mb-0">Management — coming soon.</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
