<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Management Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="dashboard-header shadow-sm">
    <div class="container-fluid">
      <div class="d-flex flex-wrap align-items-center justify-content-between py-3">
        <h1 class="logo m-0">PeoplePulse</h1>
        <nav>
          <ul class="nav gap-2">
            <li class="nav-item"><a class="nav-link menu-btn active" href="#">Home</a></li>
            <li class="nav-item"><a class="nav-link menu-btn" href="#">Settings</a></li>
            <li class="nav-item"><a class="nav-link menu-btn" href="#">Help</a></li>
            <li class="nav-item"><a class="nav-link menu-btn" href="#">Companies</a></li>
            <li class="nav-item"><a class="nav-link menu-btn" href="#">Management</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <main class="container-fluid mt-4 mb-4">
    <div class="row g-4">
      <aside class="col-lg-3 col-xl-2">
        <section class="filter-panel p-3 rounded-4 shadow-sm">
          <h5 class="mb-3">Filter by Company</h5>
          <div id="companyFilters" class="company-filters"></div>
          <button id="clearFilters" class="btn btn-sm btn-outline-light mt-3 w-100">Clear Filters</button>
        </section>
      </aside>

      <section class="col-lg-9 col-xl-10">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
          <h4 class="m-0 text-light">Employees</h4>
          <span id="resultsCount" class="badge rounded-pill count-pill"></span>
        </div>
        <div id="employeeGrid" class="row g-4"></div>
      </section>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
